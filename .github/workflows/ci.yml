name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ENVIRONMENT: test
  DJANGO_READ_DOT_ENV: "0"
  DEBUG: "0"
  SECRET_KEY: test-secret-key
  SITE_URL: "https://testserver"
  ALLOWED_HOSTS: "localhost,127.0.0.1"

  POSTGRES_DB: awesome_repos
  POSTGRES_USER: awesome_repos
  POSTGRES_PASSWORD: awesome_repos
  POSTGRES_HOST: 127.0.0.1
  POSTGRES_PORT: 5432

  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  REDIS_PASSWORD: ""
  REDIS_DB: 0

  MAILGUN_API_KEY: ""
  AWS_S3_ENDPOINT_URL: ""

jobs:
  quality:
    name: Python quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python (uv-managed)
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --locked

      - name: Pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: pyscn static analysis
        run: make pyscn-check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build frontend assets
        run: npm run build

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: rasulkireev/custom-postgres:18
        env:
          POSTGRES_DB: awesome_repos
          POSTGRES_USER: awesome_repos
          POSTGRES_PASSWORD: awesome_repos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awesome_repos -d awesome_repos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          save-cache: false
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python (uv-managed)
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync --locked

      - name: Migrations check
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Django checks
        run: uv run python manage.py check

      - name: Create dummy webpack manifest (tests)
        run: |
          mkdir -p frontend/build
          cat > frontend/build/manifest.json <<'EOF'
          {
            "entrypoints": {
              "index": {
                "assets": {
                  "js": [],
                  "css": []
                }
              }
            }
          }
          EOF

      - name: Pytest
        run: uv run pytest -q
