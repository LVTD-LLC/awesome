{% extends 'base_landing.html' %}
{% block content %}
    <div class="flex justify-center items-center px-4 py-12 my-4 sm:px-6 lg:px-8">
        <div class="space-y-8 w-full max-w-md">
            <div class="text-center">
                <div class="flex justify-center mb-4">
                    <svg class="w-16 h-16 text-green-500"
                         fill="none"
                         stroke="currentColor"
                         viewBox="0 0 24 24"
                         xmlns="http://www.w3.org/2000/svg"
                         aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z">
                        </path>
                    </svg>
                </div>
                <h1 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-gray-100">Password changed successfully</h1>
                <p class="mt-4 text-base text-gray-600 dark:text-gray-300">
                    Your password has been changed successfully. You can now sign in with your new password.
                </p>
                <div class="mt-8">
                    <a href="{% url 'account_login' %}"
                       class="inline-flex min-h-11 items-center justify-center rounded-md border border-transparent bg-green-700 px-4 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-green-800 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 dark:bg-green-500 dark:text-green-950 dark:hover:bg-green-400 dark:focus:ring-offset-gray-950">
                        Sign in
                    </a>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
